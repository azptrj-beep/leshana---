<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soureth Learning App PRO</title><link rel="stylesheet" href="style.css" /></head><body><!-- ================= HEADER ================= --><header>  <div class="logo-container">
    <img src="logo.png" class="logo" />
    <div>
      <h2>Soureth Learning</h2>
      <p class="subtitle">App éducative Soureth PRO</p>
    </div>
  </div>  <!-- BURGER --><button id="burger" onclick="toggleMenu()">☰</button>

  <nav id="nav">
    <a href="#home">Accueil</a>
    <a href="#alphabet">Alphabet</a>
    <a href="#quiz">Quiz</a>
    <a href="#progress">Progression</a>
  </nav><button class="btn btn-secondary" onclick="toggleTheme()">🌗</button>

</header><!-- ================= HERO ================= --><section class="hero" id="home">
  <h1>Apprends le Soureth comme une app pro</h1>
  <p>Alphabet, quiz, audio, progression et niveaux.</p>  <div class="hero-buttons">
    <button class="btn btn-primary" onclick="startLearning()">Commencer</button>
    <button class="btn btn-secondary" onclick="speakLetter('ܐ')">🔊 Test audio</button>
  </div>
</section><!-- ================= ALPHABET ================= --><section id="alphabet">
  <h2>Alphabet</h2>
  <div class="alphabet-grid" id="alphabetGrid"></div>
</section><!-- ================= KEYBOARD ================= --><section>
  <h2>Clavier Soureth</h2>
  <div id="keyboard"></div>
  <input type="text" id="inputBox" placeholder="Écris ici..." />
</section><!-- ================= QUIZ ================= --><section id="quiz">
  <h2>Quiz</h2>  <div class="card">
    <p id="question">Chargement...</p><button class="btn btn-primary" onclick="answer(true)">Correct</button>
<button class="btn btn-secondary" onclick="answer(false)">Faux</button>

<p id="levelText"></p>

  </div>
</section><!-- ================= PROGRESS ================= --><section id="progress">
  <h2>Progression</h2>  <div class="progress-card">
    <p>Niveau: <span id="level">1</span></p><div class="progress-bar">
  <div class="progress" id="progressBar"></div>
</div>

<p id="xpText">XP: 0</p>

  </div>
</section><!-- ================= FOOTER ================= --><footer>
  © 2026 Soureth Learning App PRO
</footer><!-- ================= JS ================= --><script>

/* ================= DATA ================= */
const alphabet = ['ܐ','ܒ','ܓ','ܕ','ܗ','ܘ','ܙ','ܚ','ܛ'];

let xp = parseInt(localStorage.getItem("xp") || 0);
let level = parseInt(localStorage.getItem("level") || 1);
let theme = localStorage.getItem("theme") || "dark";

let currentAnswer = false;

/* ================= INIT ================= */
function init(){
  document.body.className = theme + "-mode";

  renderAlphabet();
  renderKeyboard();
  updateUI();
  nextQuestion();
}

/* ================= MENU ================= */
function toggleMenu(){
  document.getElementById("nav").classList.toggle("active");
}

/* ================= THEME ================= */
function toggleTheme(){
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", theme);
  document.body.className = theme + "-mode";
}

/* ================= ALPHABET ================= */
function renderAlphabet(){
  const grid = document.getElementById("alphabetGrid");

  alphabet.forEach(letter => {
    const div = document.createElement("div");
    div.className = "letter-card";
    div.innerHTML = `<div class='letter' onclick="speakLetter('${letter}')">${letter}</div>`;
    grid.appendChild(div);
  });
}

/* ================= KEYBOARD ================= */
function renderKeyboard(){
  const kb = document.getElementById("keyboard");

  alphabet.forEach(l => {
    const btn = document.createElement("button");
    btn.innerText = l;

    btn.onclick = () => {
      document.getElementById("inputBox").value += l;
      speakLetter(l);
    };

    kb.appendChild(btn);
  });
}

/* ================= AUDIO REAL ================= */
function speakLetter(letter){
  const msg = new SpeechSynthesisUtterance(letter);
  msg.lang = "ar";
  speechSynthesis.speak(msg);
}

/* ================= XP + LEVEL ================= */
function addXP(value){
  xp += value;

  if(xp >= level * 100){
    level++;
    xp = 0;
  }

  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);

  updateUI();
}

function updateUI(){
  document.getElementById("xpText").innerText = "XP: " + xp;
  document.getElementById("level").innerText = level;

  document.getElementById("progressBar").style.width = (xp) + "%";
}

/* ================= QUIZ SYSTEM ================= */
function nextQuestion(){
  currentAnswer = Math.random() > 0.5;
  document.getElementById("question").innerText = "Cette réponse est-elle correcte ?";
  document.getElementById("levelText").innerText = "Niveau " + level;
}

function answer(val){
  if(val === currentAnswer){
    addXP(20);
    alert("✔ Bonne réponse +20 XP");
  } else {
    alert("❌ Faux");
  }

  nextQuestion();
}

/* ================= NAV ================= */
function startLearning(){
  document.getElementById("alphabet").scrollIntoView({behavior:"smooth"});
}

/* ================= START ================= */
init();

</script></body>
</html>
