<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leshana Ed Soureth</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo-container">
    <img src="assets/logo.png" class="logo" alt="logo">
    <div>
      <h1 class="title">Leshana Ed Soureth</h1>
      <p class="subtitle">Apprentissage moderne</p>
    </div>
  </div>

  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <nav>
    <a href="#home">Accueil</a>
    <a href="#keyboard">Clavier</a>
    <a href="#quiz">Quiz</a>
    <a href="#write">Écriture</a>
  </nav>
</header>

<!-- ================= HOME ================= -->
<section id="home" class="page active">

  <div class="hero">
    <h1>Apprendre le Soureth Moderne</h1>
    <p>Clavier • Quiz • Écriture tactile</p>

    <button onclick="toggleTheme()">Mode clair/sombre</button>
  </div>

</section>

<!-- ================= KEYBOARD ================= -->
<section id="keyboard" class="page">

  <h2>Clavier Soureth</h2>

  <!-- IMPORTANT: INPUT CORRECT -->
  <textarea id="editor" placeholder="Écris ici..."></textarea>

  <div id="keyboard">
    <button onclick="insertLetter('ܐ')">ܐ</button>
    <button onclick="insertLetter('ܒ')">ܒ</button>
    <button onclick="insertLetter('ܓ')">ܓ</button>
    <button onclick="insertLetter('ܕ')">ܕ</button>
    <button onclick="insertLetter('ܗ')">ܗ</button>
    <button onclick="insertLetter('ܘ')">ܘ</button>
  </div>

</section>

<!-- ================= QUIZ ================= -->
<section id="quiz" class="page">

  <h2>Quiz</h2>

  <div class="quiz-box">

    <div id="question">ܐ</div>

    <div class="quiz-options">
      <button onclick="checkAnswer('ܐ')">ܐ</button>
      <button onclick="checkAnswer('ܒ')">ܒ</button>
      <button onclick="checkAnswer('ܓ')">ܓ</button>
      <button onclick="checkAnswer('ܕ')">ܕ</button>
    </div>

    <div id="quiz-result"></div>

  </div>

</section>

<!-- ================= WRITING CANVAS ================= -->
<section id="write" class="page">

  <h2>Écriture tactile</h2>

  <div class="model">
    <div id="letterDisplay"></div>
    <div id="guideLetter"></div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="board"></canvas>
  </div>

  <div style="margin-top:15px;">
    <button onclick="clearCanvas()">Effacer</button>
    <button onclick="nextLetter()">Suivant</button>
  </div>

</section>

<!-- ================= BOTTOM NAV ================= -->
<div class="bottom-nav">
  <a href="#home">🏠</a>
  <a href="#keyboard">⌨️</a>
  <a href="#quiz">🎮</a>
  <a href="#write">✍️</a>
</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
