<!DOCTYPE html><html lang="syr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soureth Moderne Soureth</title>  <!-- FONT SOURETH MODERNE -->  <link href="https://fonts.googleapis.com/css2?family=soureth&display=swap" rel="stylesheet">  <style>
    :root {
      --bg: #0f172a;
      --card: #111c33;
      --text: #e5e7eb;
      --accent: #38bdf8;
    }

    body {
      margin: 0;
      font-family: 'soureth', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 16px;
      text-align: center;
      background: var(--card);
      font-size: 20px;
      font-weight: bold;
      color: var(--accent);
    }

    .container {
      width: 95%;
      max-width: 800px;
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .canvas-box {
      background: var(--card);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    canvas {
      width: 100%;
      height: 300px;
      background: #0b1220;
      border-radius: 10px;
      touch-action: none;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      font-size: 20px;
      font-family: 'soureth', sans-serif;
      direction: rtl;
      background: #0b1220;
      color: white;
      outline: none;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .key {
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      text-align: center;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }

    .key:active {
      background: var(--accent);
      color: black;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      font-weight: bold;
      cursor: pointer;
    }
  </style></head>
<body><header>Soureth Moderne Soureth</header><div class="container">  <div class="canvas-box">
    <canvas id="draw"></canvas>
  </div>  <textarea id="text" placeholder="ܟܬܘܒ ܗܪܟܐ..."></textarea>  <div class="keyboard" id="keyboard"></div>  <div class="actions">
    <button onclick="clearText()">Effacer</button>
    <button onclick="clearCanvas()">Canvas</button>
  </div></div><script>
const canvas = document.getElementById('draw');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resize);
resize();

let drawing = false;

canvas.addEventListener('pointerdown', e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
});

canvas.addEventListener('pointerup', () => drawing = false);
canvas.addEventListener('pointerleave', () => drawing = false);

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function clearText() {
  document.getElementById('text').value = '';
}

// SOURETH MODERNE KEYS (simplifié Adiabene)
const letters = [
  "ܐ","ܒ","ܓ","ܕ","ܗ","ܘ",
  "ܙ","ܚ","ܛ","ܝ","ܟ","ܠ",
  "ܡ","ܢ","ܣ","ܥ","ܦ","ܨ",
  "ܩ","ܪ","ܫ","ܬ"
];

const keyboard = document.getElementById('keyboard');
const textarea = document.getElementById('text');

letters.forEach(l => {
  const btn = document.createElement('div');
  btn.className = 'key';
  btn.textContent = l;
  btn.onclick = () => {
    textarea.value += l;
  };
  keyboard.appendChild(btn);
});
</script>
</body>
</html>
