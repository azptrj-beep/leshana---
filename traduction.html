<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth V4</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>🌍 Traduction Français ⇄ Soureth V4</h1>

  <button id="themeBtn">🌙</button>
</header>

<section class="translator-box">

  <input id="frInput"
         type="text"
         placeholder="Entrer un mot ou phrase">

  <button id="translateBtn">Traduire</button>
  <button id="voiceBtn">🔊</button>

  <div id="suggestions"></div>

  <div id="result" class="soureth-title"></div>

  <div id="history"></div>

</section>

<script src="js/translate.js" defer></script>

</body>
</html>
