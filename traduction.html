<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traduction Soureth V3</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header>
    <h1>🌍 Traduction Français ⇄ Soureth V3</h1>

    <button id="themeToggle" class="btn-small">
      🌙 Mode
    </button>
  </header>

  <section class="translator-box">

    <input type="text"
           id="frInput"
           placeholder="Entrer un mot ou phrase"
           autocomplete="off">

    <button id="translateBtn" class="btn btn-primary">
      Traduire
    </button>

    <div id="suggestions" class="suggestions"></div>

    <button id="speakBtn" class="btn-small">
      🔊 Écouter
    </button>

    <div id="result" class="soureth-title"></div>

    <div id="history"></div>

  </section>

  <script src="js/translate.js" defer></script>

</body>
</html>
