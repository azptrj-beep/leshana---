<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth ⇄ Français</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/keyboard.css">

  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0033a0">

<!-- iOS support -->
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<header>
  <h1>🌍 Traduction Soureth ⇄ Français</h1>

  <button class="menu-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a href="index.html">🏠 Accueil</a>
    <a href="alphabet.html">🔠 Alphabet</a>
    <a href="keyboard.html">⌨️ Clavier</a>
    <a href="quiz.html">🎮 Quiz</a>
  </nav>
</header>

<section class="translator-box card">

  <div id="status" class="status">⏳ Chargement…</div>
<div class="translator-box">

    <h2>🌍 Traduction Soureth ⇄ Français</h2>

    <!-- Zone de saisie -->
    <textarea id="input" placeholder="Écris ici en Français ou en Soureth..."></textarea>

    <!-- Boutons principaux -->
    <div class="translator-buttons">
        <button id="translateBtn">Traduire</button>
        <button id="clearBtn">Effacer</button>
        <button id="swapBtn">⇄ Inverser</button>
        <button id="speakBtn">🔊 Lire</button>
        <button id="stopBtn">⏹ Stop</button>
        <button id="micBtn">🎤 Micro</button>
    </div>

    <!-- Statut -->
    <div id="status">⏳ Chargement...</div>

    <!-- Résultat -->
    <div id="result" class="translation-output">...</div>

    <!-- Clavier Soureth -->
    <h3 style="margin-top:30px;">Clavier Soureth</h3>

    <div id="keyboard-tabs"></div>

    <div id="keyboard">
        <button class="key-btn" data-letter="ܐ">ܐ</button>
        <button class="key-btn" data-letter="ܒ">ܒ</button>
        <button class="key-btn" data-letter="ܓ">ܓ</button>
        <button class="key-btn" data-letter="ܕ">ܕ</button>
        <button class="key-btn" data-letter="ܗ">ܗ</button>
        <button class="key-btn" data-letter="ܘ">ܘ</button>
        <button class="key-btn" data-letter="ܙ">ܙ</button>
        <button class="key-btn" data-letter="ܚ">ܚ</button>
        <button class="key-btn" data-letter="ܛ">ܛ</button>
        <button class="key-btn" data-letter="ܝ">ܝ</button>
        <button class="delete-btn">⌫</button>
    </div>

    <!-- Historique -->
    <h3 style="margin-top:30px;">Historique</h3>
    <div id="history"></div>

</div>

<!-- Scripts -->
<script src="keyboard.js"></script>
<script src="translate.js"></script>

</body>
</html>
