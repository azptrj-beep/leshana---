<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction FR ⇄ Soureth PRO</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar">

  <h1>🌍 FR ⇄ Soureth</h1>

  <div class="top-actions">

    <button id="swapBtn" class="icon-btn">⇄</button>
    <button id="autoBtn" class="icon-btn">⚡</button>

  </div>

</header>

<main class="container">

  <!-- INPUT -->
  <section class="card">

    <textarea id="frInput"
              placeholder="Écris ton texte ici..."
              rows="4"></textarea>

    <div id="suggestions" class="suggestions"></div>

  </section>

  <!-- ACTIONS -->
  <section class="actions">

    <button id="translateBtn" class="btn-primary">Traduire</button>
    <button id="speakBtn">🔊</button>
    <button id="stopBtn">⏹</button>
    <button id="micBtn">🎤</button>

  </section>

  <!-- OUTPUT -->
  <section class="card output">

    <div id="result">...</div>

  </section>

  <!-- HISTORY -->
  <section class="history">

    <h3>Historique</h3>
    <div id="history"></div>

  </section>

</main>

<script src="js/translate.js" defer></script>

</body>

</html>
