<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth ⇄ Français</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/traduction.css">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0033a0">
</head>

<body>

<header>
  <h1>🌍 Traduction Soureth ⇄ Français</h1>

  <button class="menu-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a href="index.html">🏠 Accueil</a>
    <a href="alphabet.html">🔠 Alphabet</a>
    <a href="keyboard.html">⌨️ Clavier</a>
    <a href="quiz.html">🎮 Quiz</a>
  </nav>
</header>

<section class="translator-box card">

  <div id="status" class="status">⏳ Chargement…</div>

  <!-- ZONE DE SAISIE -->
  <textarea id="input" placeholder="Écris ici en Français ou en Soureth…"></textarea>


  <!-- CLAVIER SOURETH -->


  <div id="keyboard-tabs">
  <button data-layout="consonnes" class="tab-btn active">Consonnes</button>
  <button data-layout="voyelles" class="tab-btn">Voyelles</button>
  <button data-layout="finales" class="tab-btn">Finales</button>
  <button data-layout="chiffres" class="tab-btn">Chiffres</button>
  <button data-layout="ponctuation" class="tab-btn">Ponctuation</button>
</div>

<div id="keyboard"></div>

  <!-- BOUTONS -->
  <div class="translator-buttons">
    <button id="translateBtn" class="btn btn-primary">🔁 Traduire</button>
    <button id="clearBtn" class="btn btn-secondary">🧹 Effacer</button>
    <button id="swapBtn" class="btn btn-secondary">⇄ Inverser</button>
  </div>

  <!-- RÉSULTAT -->
  <div id="result" class="translation-output">...</div>

  <!-- AUDIO -->
  <div class="audio-controls">
    <button id="speakBtn" class="audio-btn">🔊 Lire</button>
    <button id="stopBtn" class="audio-btn">⏹ Stop</button>
    <button id="micBtn" class="audio-btn">🎤 Micro</button>
  </div>

  <!-- HISTORIQUE -->
  <h2>🕘 Historique</h2>
  <div id="history" class="history-box"></div>

</section>

<!-- JS -->
<script src="js/keyboard.js" defer></script>
<script src="js/translate.js" defer></script>
<script src="js/app.js" defer></script>

</body>
</html>
