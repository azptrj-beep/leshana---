<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth ⇄ Français</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/keyboard.css">

  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0033a0">

<!-- iOS support -->
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<header>
  <h1>🌍 Traduction Soureth ⇄ Français</h1>

  <button class="menu-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a href="index.html">🏠 Accueil</a>
    <a href="alphabet.html">🔠 Alphabet</a>
    <a href="keyboard.html">⌨️ Clavier</a>
    <a href="quiz.html">🎮 Quiz</a>
  </nav>
</header>

<section class="translator-box card">

  <div id="status" class="status">⏳ Chargement…</div>

  <!-- ZONE DE SAISIE -->
  <textarea id="input" placeholder="Écris ici en Français ou en Soureth…"></textarea>


  <!-- CLAVIER SOURETH -->

<div id="keyboard"></div>

  <!-- BOUTONS -->
  <div class="translator-buttons">
    <button id="translateBtn" class="btn btn-primary">🔁 Traduire</button>
    <button id="clearBtn" class="btn btn-secondary">🧹 Effacer</button>
    <button id="swapBtn" class="btn btn-secondary">⇄ Inverser</button>
  </div>

  <!-- RÉSULTAT -->
  <div id="result" class="translation-output">...</div>

  <!-- AUDIO -->
  <div class="audio-controls">
    <button id="speakBtn" class="audio-btn">🔊 Lire</button>
    <button id="stopBtn" class="audio-btn">⏹ Stop</button>
    <button id="micBtn" class="audio-btn">🎤 Micro</button>
  </div>

  <!-- HISTORIQUE -->
  <h2>🕘 Historique</h2>
  <div id="history" class="history-box"></div>

</section>

<!-- JS -->
<script src="js/global.js"></script>
<script src="js/keyboard.js"></script>

</body>
</html>
