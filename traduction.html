<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth ⇄ Français</title>

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/keyboard.css">
  <link rel="stylesheet" href="css/soureth.css">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0033a0">

  <!-- iOS support -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

<header>
  <h1>🌍 Traduction Soureth ⇄ Français</h1>

  <button class="menu-toggle" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>

  <nav>
    <a href="index.html">🏠 Accueil</a>
    <a href="alphabet.html">🔠 Alphabet</a>
    <a href="keyboard.html">⌨️ Clavier</a>
    <a href="quiz.html">🎮 Quiz</a>
  </nav>
</header>

<section class="translator-box card">

  <!-- Statut -->
  <div id="status" class="status">⏳ Chargement…</div>

  <!-- Zone de saisie -->
  <textarea id="translateInput" class="ltr"
    placeholder="Écris ici en Soureth ou en Français..."></textarea>

  <!-- Boutons principaux -->
  <div class="translator-buttons">
    <button onclick="translateText()">Traduire</button>
    <button onclick="clearAll()">Effacer</button>
    <button onclick="swapText()">⇄ Inverser</button>
    <button onclick="speakText()">🔊 Lire</button>
    <button onclick="stopSpeak()">⏹ Stop</button>
    <button onclick="startMic()">🎤 Micro</button>
  </div>

  <!-- Résultat -->
  <textarea id="translateResult" class="ltr translation-output" readonly></textarea>

  <!-- Clavier Soureth -->
  <h3 style="margin-top:30px;">Clavier Soureth</h3>

  <div id="keyboard" class="rtl">

    <!-- Ligne 1 -->
    <button class="key-btn" onclick="insertLetter('ܐ')">ܐ</button>
    <button class="key-btn" onclick="insertLetter('ܒ')">ܒ</button>
    <button class="key-btn" onclick="insertLetter('ܓ')">ܓ</button>
    <button class="key-btn" onclick="insertLetter('ܕ')">ܕ</button>
    <button class="key-btn" onclick="insertLetter('ܗ')">ܗ</button>
    <button class="key-btn" onclick="insertLetter('ܘ')">ܘ</button>
    <button class="key-btn" onclick="insertLetter('ܙ')">ܙ</button>
    <button class="key-btn" onclick="insertLetter('ܚ')">ܚ</button>
    <button class="key-btn" onclick="insertLetter('ܛ')">ܛ</button>
    <button class="key-btn" onclick="insertLetter('ܝ')">ܝ</button>

    <!-- Ligne 2 -->
    <button class="key-btn" onclick="insertLetter('ܟ')">ܟ</button>
    <button class="key-btn" onclick="insertLetter('ܠ')">ܠ</button>
    <button class="key-btn" onclick="insertLetter('ܡ')">ܡ</button>
    <button class="key-btn" onclick="insertLetter('ܢ')">ܢ</button>
    <button class="key-btn" onclick="insertLetter('ܣ')">ܣ</button>
    <button class="key-btn" onclick="insertLetter('ܥ')">ܥ</button>
    <button class="key-btn" onclick="insertLetter('ܦ')">ܦ</button>
    <button class="key-btn" onclick="insertLetter('ܨ')">ܨ</button>
    <button class="key-btn" onclick="insertLetter('ܩ')">ܩ</button>
    <button class="key-btn" onclick="insertLetter('ܪ')">ܪ</button>

    <!-- Ligne 3 -->
    <button class="key-btn" onclick="insertLetter('ܫ')">ܫ</button>
    <button class="key-btn" onclick="insertLetter('ܬ')">ܬ</button>

    <!-- Espace + suppression -->
    <button class="key-btn space" onclick="insertLetter(' ')">␣ Espace</button>
    <button class="delete-btn" onclick="deleteLetter()">⌫</button>

  </div>

  <!-- Historique -->
  <h3 style="margin-top:30px;">Historique</h3>
  <div id="history"></div>

</section>

<!-- Scripts -->
<script src="js/traduction.js"></script>
<script src="js/app.js"></script>

</body>
</html>
