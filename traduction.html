<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction FR ⇄ Soureth</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topbar">

  <h1>🌍 FR ⇄ Soureth</h1>

  <div class="top-actions">
    <button id="swapBtn">⇄</button>
  </div>

</header>

<main class="container">

  <textarea id="frInput" placeholder="Écris ton texte..."></textarea>

  <div class="buttons">

    <button id="translateBtn">Traduire</button>
    <button id="speakBtn">🔊</button>
    <button id="stopBtn">⏹</button>
    <button id="micBtn">🎤</button>

  </div>

  <div id="suggestions"></div>

  <div id="result"></div>

  <div id="history"></div>

</main>

<script src="js/translate.js" defer></script>

</body>

</html>
