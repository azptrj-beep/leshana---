<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth PRO</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

  <h1>🌍 Traduction FR ⇄ Soureth</h1>

  <button id="swapBtn" class="btn">⇄</button>
  <button id="autoBtn" class="btn">⚡ Auto OFF</button>

</header>

<section class="translator-box">

  <input id="frInput" type="text" placeholder="Entrer un texte">

  <div class="translator-buttons">

    <button id="translateBtn" class="btn btn-primary">Traduire</button>
    <button id="speakBtn" class="btn">🔊</button>
    <button id="stopBtn" class="btn">⏹</button>
    <button id="micBtn" class="btn">🎤</button>

  </div>

  <div id="suggestions"></div>
  <div id="result"></div>
  <div id="history"></div>

</section>

<script src="js/translate.js" defer></script>

</body>
</html>
