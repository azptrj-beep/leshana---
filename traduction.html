<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soureth Translator V5</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <h1>🌍 Soureth Translator V5</h1>

  <div id="profile">
    ⭐ XP: <span id="xp">0</span>
  </div>
</header>

<section class="translator">

  <input id="input" placeholder="Écris une phrase...">

  <div class="buttons">
    <button id="translateBtn">Traduire</button>
    <button id="speakBtn">🔊</button>
    <button id="learnBtn">📚 Apprendre</button>
  </div>

  <div id="result"></div>

  <div id="suggestions"></div>

</section>

<script src="js/app.js" defer></script>

</body>
</html>
