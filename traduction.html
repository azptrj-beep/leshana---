<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth</title>

  <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

<header>

  <h1>🌍 Traduction Français ⇄ Soureth</h1>

</header>

<section class="translator-box">

  <input type="text"
         id="input"
         placeholder="Entrer un mot ou phrase">

  <div class="translator-buttons">

    <button id="translateBtn"
            class="btn btn-primary">
      Traduire
    </button>

    <button id="voiceBtn"
            class="btn">
      🔊
    </button>

  </div>

  <div id="suggestions"></div>

  <div id="result"
       class="soureth-title">
  </div>

  <div id="history"></div>

</section>

<script src="js/translate.js" defer></script>

</body>
</html>
