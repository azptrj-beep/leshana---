<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth</title>

  <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

  <header class="translator-header">

    <h1>
      🌍 Traduction Français ⇄ Soureth
    </h1>

    <button id="themeBtn"
            class="btn theme-btn">
      🌙
    </button>

  </header>

  <section class="translator-box">

    <input type="text"
           id="frInput"
           placeholder="Entrer un mot ou phrase"
           autocomplete="off">

    <div class="translator-buttons">

      <button id="translateBtn"
              class="btn btn-primary">
        Traduire
      </button>

      <button id="speakBtn"
              class="btn">
        🔊
      </button>

      <button id="stopBtn"
              class="btn">
        ⏹
      </button>

      <button id="micBtn"
              class="btn">
        🎤
      </button>

    </div>

    <div id="suggestions"
         class="suggestions">
    </div>

    <div id="result"
         class="soureth-title">
    </div>

    <div id="history"
         class="history">
    </div>

  </section>

  <script src="js/translate.js" defer></script>

</body>

</html>
