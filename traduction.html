
<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Traduction Soureth</title>

  <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

  <header>

    <h1>
      🌍 Traduction Français ⇄ Soureth
    </h1>

  </header>

  <section class="translator-box">

    <input type="text"
           id="frInput"
           placeholder="Entrer un mot français">

    <button class="btn btn-primary"
            onclick="translate()">
      Traduire
    </button>

    <div id="result"
         class="soureth-title"
         style="margin-top:30px;"></div>

  </section>

  <script src="js/translate.js"></script>

<link rel="stylesheet" href="css/style.css">

<script src="js/app.js" defer></script>
<script src="js/keyboard.js" defer></script>
<script src="js/audio.js" defer></script>

</body>

</html>
