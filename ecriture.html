<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="icon" href="images/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Écriture Soureth</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0033a0">

<style>

/* =========================
   FONT ADIABENE
========================= */

@font-face {
  font-family: "Adiabene";

  src:
    url("assets/fonts/Adiabene.woff2") format("woff2"),
    url("assets/fonts/Adiabene.ttf") format("truetype");

  font-weight: normal;
  font-style: normal;
}

/* =========================
   BODY
========================= */

body {
  font-family: "Adiabene", Arial, sans-serif;
  margin: 0;
  background: #f4f7ff;
  text-align: center;
}

/* =========================
   FORCE FONT ADIABENE
========================= */

.letter-box,
.guide,
canvas,
button,
h1,
h2,
p,
nav a {
  font-family: "Adiabene", sans-serif !important;
}
header {
  background: #0033a0;
  color: white;
  padding: 20px;
}

nav a {
  margin: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.letter-box {
  font-size: 80px;
  margin: 20px;
  color: #0033a0;
}

.canvas-wrapper {
  position: relative;
  display: inline-block;
}

canvas {
  border: 2px solid #0033a0;
  background: white;
  border-radius: 10px;
  touch-action: none;
}

.guide {
  font-size: 120px;
  opacity: 0.1;
  position: absolute;
  pointer-events: none;
  user-select: none;
  top: 40px;
  left: 40px;
}

.btn {
  background: #d40000;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
}

.dark-mode {
  background: #121212;
  color: white;
}

.dark-mode header {
  background: #111;
}

.dark-mode canvas {
  background: #1f1f1f;
  border-color: white;
}

.dark-mode .letter-box {
  color: white;
}
</style>
</head>

<body>

<header>
  <h1>✍️ Écriture du Soureth</h1>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="alphabet.html">Alphabet</a>
    <a href="voyelles.html">Voyelles</a>
    <a href="#" onclick="toggleDarkMode()">Mode sombre</a>
  </nav>
</header>

<div class="container">

  <h2>Entraîne-toi à écrire</h2>
  <p>Trace la lettre avec ton doigt ou ta souris</p>

  <div class="letter-box" id="letterDisplay">ܐ</div>

  <div class="canvas-wrapper">
    <div class="guide" id="guideLetter">ܐ</div>
    <canvas id="board" width="300" height="300"></canvas>
  </div>

  <br>

  <button class="btn" onclick="clearCanvas()">Effacer</button>
<button class="btn" onclick="nextLetter()">Lettre suivante</button>
<button class="btn" onclick="speakLetter()">🔊 Prononcer</button>

</div>

<script>
const letters = ["ܐ","ܒ","ܓ","ܕ","ܗ","ܘ","ܙ","ܚ","ܛ","ܝ","ܟ","ܠ","ܡ","ܢ","ܣ","ܥ","ܦ","ܨ","ܩ","ܪ","ܫ","ܬ"];

let index = 0;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let drawing = false;

function speakLetter() {
  speechSynthesis.cancel();

  const letter = letters[index];

  const map = {
    "ܐ": "a",
    "ܒ": "bé",
    "ܓ": "gué",
    "ܕ": "dé",
    "ܗ": "hé",
    "ܘ": "ou",
    "ܙ": "zé",
    "ܚ": "kh",
    "ܛ": "t",
    "ܝ": "y",
    "ܟ": "k",
    "ܠ": "l",
    "ܡ": "m",
    "ܢ": "n",
    "ܣ": "s",
    "ܥ": "a guttural",
    "ܦ": "p",
    "ܨ": "ts",
    "ܩ": "q",
    "ܪ": "r",
    "ܫ": "sh",
    "ܬ": "t"
  };

  const utterance = new SpeechSynthesisUtterance(map[letter] || letter);

  utterance.lang = "fr-FR";
  utterance.rate = 0.9;
  utterance.pitch = 1;

  window.speechSynthesis.speak(utterance);
}
  

function setLetter() {
  document.getElementById("letterDisplay").innerText = letters[index];
  document.getElementById("guideLetter").innerText = letters[index];
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();

  const touch = e.touches?.[0] || e.changedTouches?.[0];

  return {
    x: (touch ? touch.clientX : e.clientX) - rect.left,
    y: (touch ? touch.clientY : e.clientY) - rect.top
  };
}

function start(e) {
  drawing = true;

  const pos = getPos(e);

  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);

  e.preventDefault();
}

function draw(e) {
  if (!drawing) return;

  const pos = getPos(e);

  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#0033a0";

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);

  e.preventDefault();
}

function stop() {
  drawing = false;
}

canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stop);
canvas.addEventListener("mouseleave", stop);

canvas.addEventListener("touchstart", start, { passive: false });
canvas.addEventListener("touchmove", draw, { passive: false });
canvas.addEventListener("touchend", stop);

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function nextLetter() {
  index = (index + 1) % letters.length;
  setLetter();
  clearCanvas();
}

function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");
}

setLetter();
</script>

</body>
</html>
