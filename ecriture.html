<!DOCTYPE html>

<head>

<h1>✍️ Écriture Soureth</h1>

  <canvas
    id="writingCanvas"
    width="350"
    height="350">

</div>

</div>

<div id="letterGrid"></div>

<script src="js/ecriture.js"></script>

#writingCanvas {
    width: auto !important;
    height: auto !important;
    max-width: 100%;
    display: block;
    margin: auto;
}
