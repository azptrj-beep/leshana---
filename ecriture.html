<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Écriture Soureth Moderne</title>

<link rel="icon" href="assets/images/logo.png">

<style>

/* =========================
   FONT
========================= */

@font-face{
  font-family:'Soureth';
  src:url('assets/fonts/aa-_nohadra_marcus.woff2') format('woff2');
}

/* =========================
   GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f7ff;
  color:#111;
  text-align:center;
  min-height:100vh;
}

/* =========================
   HEADER
========================= */

header{
  background:#0033a0;
  color:white;
  padding:20px;
}

header h1{
  margin-bottom:10px;
}

nav{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* =========================
   CONTENT
========================= */

.container{
  padding:25px;
  max-width:900px;
  margin:auto;
}

.subtitle{
  margin-bottom:25px;
  opacity:0.8;
}

/* =========================
   LETTER
========================= */

.letter-box{
  font-family:'Soureth';
  font-size:120px;
  color:#0033a0;
  margin-bottom:25px;
  direction:rtl;
}

/* =========================
   CANVAS
========================= */

.canvas-wrapper{
  position:relative;
  width:100%;
  max-width:420px;
  margin:auto;
}

#board{
  width:100%;
  height:420px;
  background:white;
  border:3px solid #0033a0;
  border-radius:22px;
  display:block;
  touch-action:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* =========================
   GUIDE LETTER
========================= */

.guide{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  font-family:'Soureth';
  font-size:220px;

  opacity:0.08;

  pointer-events:none;

  direction:rtl;
}

/* =========================
   BUTTONS
========================= */

.buttons{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
  margin-top:25px;
}

.btn{
  border:none;
  padding:14px 22px;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn-clear{
  background:#d40000;
  color:white;
}

.btn-next{
  background:#0033a0;
  color:white;
}

.btn-dark{
  background:#111827;
  color:white;
}

/* =========================
   DARK MODE
========================= */

.dark-mode{
  background:#0f172a;
  color:white;
}

.dark-mode #board{
  background:#111827;
  border-color:#38bdf8;
}

.dark-mode .letter-box{
  color:#38bdf8;
}

.dark-mode .guide{
  opacity:0.05;
}

.dark-mode header{
  background:#020617;
}

/* =========================
   MOBILE
========================= */

@media(max-width:600px){

  .letter-box{
    font-size:90px;
  }

  .guide{
    font-size:170px;
  }

  #board{
    height:340px;
  }

}

</style>

</head>

<body>

<header>

<h1>✍️ Écriture Soureth Moderne</h1>

<nav>

<a href="index.html">🏠 Accueil</a>

<a href="alphabet.html">🔠 Alphabet</a>

<a href="voyelles.html">🔤 Voyelles</a>

</nav>

</header>

<div class="container">

<h2 class="subtitle">
Trace la lettre avec ton doigt ou ton stylet
</h2>

<div
  class="letter-box"
  id="letterDisplay">
  ܐ
</div>

<div class="canvas-wrapper">

<div
  class="guide"
  id="guideLetter">
  ܐ
</div>

<canvas
  id="board"
  width="420"
  height="420">
</canvas>

</div>

<div class="buttons">

<button
  class="btn btn-clear"
  onclick="clearCanvas()">
  Effacer
</button>

<button
  class="btn btn-next"
  onclick="nextLetter()">
  Lettre suivante
</button>

<button
  class="btn btn-dark"
  onclick="toggleDarkMode()">
  Mode sombre
</button>

</div>

</div>

<script>

/* =========================
   LETTERS
========================= */

const letters = [
"ܐ","ܒ","ܓ","ܕ","ܗ",
"ܘ","ܙ","ܚ","ܛ","ܝ",
"ܟ","ܠ","ܡ","ܢ","ܣ",
"ܥ","ܦ","ܨ","ܩ","ܪ",
"ܫ","ܬ"
];

let index = 0;

/* =========================
   CANVAS
========================= */

const canvas =
  document.getElementById("board");

const ctx =
  canvas.getContext("2d");

let drawing = false;

/* =========================
   RESIZE
========================= */

function resizeCanvas(){

  const ratio =
    window.devicePixelRatio || 1;

  const rect =
    canvas.getBoundingClientRect();

  canvas.width =
    rect.width * ratio;

  canvas.height =
    rect.height * ratio;

  ctx.scale(ratio, ratio);
}

resizeCanvas();

window.addEventListener(
  "resize",
  resizeCanvas
);

/* =========================
   LETTER
========================= */

function setLetter(){

  document.getElementById(
    "letterDisplay"
  ).innerText = letters[index];

  document.getElementById(
    "guideLetter"
  ).innerText = letters[index];
}

setLetter();

/* =========================
   POSITION
========================= */

function getPos(e){

  const rect =
    canvas.getBoundingClientRect();

  return {

    x:e.clientX - rect.left,

    y:e.clientY - rect.top
  };
}

/* =========================
   DRAW
========================= */

function startDraw(e){

  drawing = true;

  const pos = getPos(e);

  ctx.beginPath();

  ctx.moveTo(pos.x, pos.y);

  e.preventDefault();
}

function draw(e){

  if(!drawing) return;

  const pos = getPos(e);

  ctx.lineWidth = 6;

  ctx.lineCap = "round";

  ctx.lineJoin = "round";

  ctx.strokeStyle = "#38bdf8";

  ctx.lineTo(pos.x, pos.y);

  ctx.stroke();

  e.preventDefault();
}

function stopDraw(){

  drawing = false;
}

/* =========================
   POINTER EVENTS
========================= */

canvas.addEventListener(
  "pointerdown",
  startDraw
);

canvas.addEventListener(
  "pointermove",
  draw
);

canvas.addEventListener(
  "pointerup",
  stopDraw
);

canvas.addEventListener(
  "pointerleave",
  stopDraw
);

/* =========================
   ACTIONS
========================= */

function clearCanvas(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );
}

function nextLetter(){

  index++;

  if(index >= letters.length){
    index = 0;
  }

  setLetter();

  clearCanvas();
}

function toggleDarkMode(){

  document.body.classList.toggle(
    "dark-mode"
  );
}

</script>

</body>
</html>
