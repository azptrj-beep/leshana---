</header><div class="container">  <h2>Entraîne-toi à écrire</h2>
  <p>Trace la lettre avec ton doigt ou ta souris</p>  <div class="letter-box" id="letterDisplay">ܐ</div>  <div class="canvas-wrapper">
    <div class="guide" id="guideLetter">ܐ</div>
    <canvas id="board" width="300" height="300"></canvas>
  </div>  <br><button class="btn" onclick="clearCanvas()">Effacer</button> <button class="btn" onclick="nextLetter()">Lettre suivante</button>

</div><script>
const letters = ["ܐ","ܒ","ܓ","ܕ","ܗ","ܘ","ܙ","ܚ","ܛ","ܝ","ܟ","ܠ","ܡ","ܢ","ܣ","ܥ","ܦ","ܨ","ܩ","ܪ","ܫ","ܬ"];

let index = 0;

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

let drawing = false;

function setLetter() {
  document.getElementById("letterDisplay").innerText = letters[index];
  document.getElementById("guideLetter").innerText = letters[index];
}

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchmove", function(e) {
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();

  draw({
    offsetX: touch.clientX - rect.left,
    offsetY: touch.clientY - rect.top
  });
});

function draw(e) {
  if (!drawing) return;

  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#0033a0";

  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function nextLetter() {
  index = (index + 1) % letters.length;
  setLetter();

function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
}
  clearCanvas();
}

setLetter();

<canvas id="writingCanvas"></canvas>

</script></body>
