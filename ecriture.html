<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Écriture Soureth</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/ecriture.css">
</head>

<body>

<h1>✍️ Écriture Soureth</h1>

<div class="writing-container">

  <div id="guideLetter">ܐ</div>

  <canvas
    id="writingCanvas"
    width="350"
    height="350">
  </canvas>

</div>

<div class="canvas-controls">

  <button id="prevLetter">⬅</button>

  <button id="clearCanvas">
    🗑 Effacer
  </button>

  <button id="nextLetter">➡</button>

<section class="writing-section">

    <div class="letter-card">
        <div id="currentLetter">ܐ</div>
        <p>Trace la lettre</p>
    </div>

    <canvas id="writingCanvas"></canvas>

    <div class="writing-actions">

        <button id="prevLetter">⬅</button>
        <button id="clearBtn">🗑 Effacer</button>
        <button id="nextBtn">Suivante</button>
    </div>

    <div id="letterGrid"></div>

</section>

</div>

<script src="js/ecriture.js"></script>

</body>
</html>
