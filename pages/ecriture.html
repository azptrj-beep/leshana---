<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Écriture Soureth Moderne</title>

<link rel="icon"
      href="../images/logo.png">

<link rel="manifest"
      href="../manifest.json">

<meta name="theme-color"
      content="#0033a0">

<style>

/* =========================
   GLOBAL
========================= */

@font-face {
  font-family: 'Adiabene';

  src:
    url('../assets/fonts/Adiabene.woff2') format('woff2'),
    url('../assets/fonts/Adiabene.ttf') format('truetype');
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7ff;
  text-align:center;
}

/* =========================
   HEADER
========================= */

header{
  background:#0033a0;
  color:white;
  padding:20px;
}

nav{
  margin-top:10px;
}

nav a{
  color:white;
  text-decoration:none;
  margin:10px;
  font-weight:bold;
}

/* =========================
   CONTENT
========================= */

.container{
  padding:20px;
}

.letter-box{
  font-family:'Adiabene';
  font-size:120px;
  color:#0033a0;
  margin:20px;
  direction:rtl;
}

/* =========================
   CANVAS
========================= */

.canvas-wrapper{
  position:relative;
  display:inline-block;
}

canvas{
  width:320px;
  height:320px;
  background:white;
  border:3px solid #0033a0;
  border-radius:18px;
  touch-action:none;
}

/* =========================
   GUIDE LETTER
========================= */

.guide{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  font-family:'Adiabene';

  font-size:180px;

  opacity:0.08;

  pointer-events:none;

  direction:rtl;
}

/* =========================
   BUTTONS
========================= */

.btn{
  background:#d40000;
  color:white;

  border:none;

  padding:12px 18px;

  border-radius:12px;

  margin:10px;

  cursor:pointer;

  font-size:16px;
}

/* =========================
   DARK MODE
========================= */

.dark-mode{
  background:#121212;
  color:white;
}

.dark-mode canvas{
  background:#1f1f1f;
  border-color:white;
}

.dark-mode .letter-box{
  color:white;
}

</style>

</head>

<body>

<header>

<h1>✍️ Écriture Soureth Moderne</h1>

<nav>

  <a href="../index.html">🏠 Accueil</a>

  <a href="alphabet.html">🔠 Alphabet</a>

  <a href="voyelles.html">🔤 Voyelles</a>

</nav>

</header>

<div class="container">

<h2>Trace la lettre</h2>

<div class="letter-box soureth-title"
     id="letterDisplay">
  ܐ
</div>

<div class="canvas-wrapper">

<div class="guide soureth-title"
     id="guideLetter">
  ܐ
</div>

<canvas id="board"
        width="320"
        height="320"></canvas>

</div>

<br>

<button class="btn"
        onclick="clearCanvas()">

  Effacer

</button>

<button class="btn"
        onclick="nextLetter()">

  Lettre suivante

</button>

<button class="btn"
        onclick="toggleDarkMode()">

  Mode sombre

</button>

</div>

<script>

/* =========================
   LETTERS
========================= */

const letters = [
"ܐ","ܒ","ܓ","ܕ","ܗ",
"ܘ","ܙ","ܚ","ܛ","ܝ",
"ܟ","ܠ","ܡ","ܢ","ܣ",
"ܥ","ܦ","ܨ","ܩ","ܪ",
"ܫ","ܬ"
];

let index = 0;

/* =========================
   CANVAS
========================= */

const canvas =
  document.getElementById("board");

const ctx =
  canvas.getContext("2d");

let drawing = false;

/* =========================
   SET LETTER
========================= */

function setLetter(){

  document.getElementById(
    "letterDisplay"
  ).innerText = letters[index];

  document.getElementById(
    "guideLetter"
  ).innerText = letters[index];
}

/* =========================
   POSITION
========================= */

function getPos(e){

  const rect =
    canvas.getBoundingClientRect();

  const touch =
    e.touches?.[0];

  return {

    x:
      (touch ? touch.clientX : e.clientX)
      - rect.left,

    y:
      (touch ? touch.clientY : e.clientY)
      - rect.top
  };
}

/* =========================
   START DRAW
========================= */

function startDraw(e){

  drawing = true;

  const pos = getPos(e);

  ctx.beginPath();

  ctx.moveTo(pos.x, pos.y);

  e.preventDefault();
}

/* =========================
   DRAW
========================= */

function draw(e){

  if(!drawing) return;

  const pos = getPos(e);

  ctx.lineWidth = 6;

  ctx.lineCap = "round";

  ctx.strokeStyle = "#0033a0";

  ctx.lineTo(pos.x, pos.y);

  ctx.stroke();

  e.preventDefault();
}

/* =========================
   STOP DRAW
========================= */

function stopDraw(){

  drawing = false;

  ctx.beginPath();
}

/* =========================
   EVENTS
========================= */

canvas.addEventListener(
  "mousedown",
  startDraw
);

canvas.addEventListener(
  "mousemove",
  draw
);

canvas.addEventListener(
  "mouseup",
  stopDraw
);

canvas.addEventListener(
  "mouseleave",
  stopDraw
);

canvas.addEventListener(
  "touchstart",
  startDraw,
  { passive:false }
);

canvas.addEventListener(
  "touchmove",
  draw,
  { passive:false }
);

canvas.addEventListener(
  "touchend",
  stopDraw
);

/* =========================
   ACTIONS
========================= */

function clearCanvas(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );
}

function nextLetter(){

  index++;

  if(index >= letters.length){
    index = 0;
  }

  setLetter();

  clearCanvas();
}

function toggleDarkMode(){

  document.body.classList.toggle(
    "dark-mode"
  );
}

/* =========================
   INIT
========================= */

setLetter();

</script>

</body>

</html>
