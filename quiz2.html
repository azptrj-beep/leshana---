
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Soureth</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <h1>Quiz Soureth</h1>
</header>

<section class="card">
  <h2>Quelle est cette lettre ?</h2>

  <h1 id="letter">ܐ</h1>

  <button onclick="checkAnswer('a')">a</button>
  <button onclick="checkAnswer('b')">b</button>
  <button onclick="checkAnswer('g')">g</button>

  <p id="result"></p>
</section>

<script>
function checkAnswer(answer) {
  if (answer === "a") {
    document.getElementById("result").innerText = "✅ Correct";
  } else {
    document.getElementById("result").innerText = "❌ Faux";
  }
}
</script>

</body>
</html>
